<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0C0B09" />
    <title>LitGUI for Volumio</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />

    <!--
      LitGUI standalone host page.

      Loaded by Volumio when the user selects "LitGUI" in
      Settings → System → User Interface Style. The plugin's
      registerThirdPartyUI() points Volumio's web server here.

      Mode flow:
        1. <volumio-panel> is rendered with the `standalone` attribute.
        2. ./litgui-panel.js loads, runs createAdapter("volumio") based
           on the attribute, opens an EIO3 Socket.IO connection to
           Volumio's own server (same origin), and drives the UI.
        3. No Home Assistant. No HA WebSocket. No service layer.

      The CSS custom properties below are the HA-supplied tokens that
      shared-styles.js consumes via var(--name). The --volumio-* tokens
      are owned by shared-styles.js itself and don't need to be repeated.
    -->

    <style>
      :root {
        /* Brand palette — LitGUI dark theme (T41) */
        --primary-color: #EF9F27;            /* amber flame */
        --primary-background-color: #0C0B09; /* deep neutral */
        --card-background-color: #1A1A1A;    /* one shade up from bg */
        --divider-color: rgba(255, 255, 255, 0.08);

        /* Text — neutral grayscale, reads well over amber accents
           and album-art bleeds */
        --primary-text-color: #E0E0E0;
        --secondary-text-color: #999999;

        /* Status */
        --error-color: #CF6679;

        /* Typography — system stack with Inter as preferred. Falls back
           cleanly across platforms without web-font loading. */
        --ha-font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          Arial,
          sans-serif;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--primary-background-color);
        color: var(--primary-text-color);
        font-family: var(--ha-font-family);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow: hidden; /* panel manages its own scrolling regions */
      }

      volumio-panel {
        display: block;
        height: 100%;
        width: 100%;
      }

      /* Loading state — visible until the bundle defines <volumio-panel>
         and the custom element upgrades. Once upgraded the panel's own
         template takes over and this rule no longer matches the slot. */
      volumio-panel:not(:defined) {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      /* Fallback shown until <volumio-panel> upgrades. If the bundle never
         loads (e.g. served from an SPA-fallback route where the JS 404s),
         this stays visible and the link reaches a working entry point.
         The panel has no <slot>, so on a normal load the shadow root
         replaces this and it never shows under the live UI. */
      .litgui-loading {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        color: var(--secondary-text-color);
        font-size: 14px;
        text-align: center;
      }
      volumio-panel:defined .litgui-loading {
        display: none;
      }
      .litgui-loading a {
        color: var(--primary-color);
        text-decoration: none;
        border: 1px solid var(--divider-color);
        padding: 8px 16px;
        border-radius: 8px;
      }
      .litgui-loading a:hover {
        border-color: var(--primary-color);
      }
    </style>
  </head>
  <body>
    <volumio-panel standalone>
      <div class="litgui-loading">
        <div>Loading LitGUI…</div>
        <a href="/">Return to player</a>
      </div>
    </volumio-panel>
    <script type="module" src="./litgui-panel.js"></script>
  </body>
</html>
